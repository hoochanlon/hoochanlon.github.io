# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://jpanther.github.io/congo/docs/getting-started/
# 稳定主域名（自定义域会过期）；资源用 RelPermalink 根相对路径，双域名访问也不挂样式
baseURL = "https://hoochanlon.github.io/"
theme = "congo"
defaultContentLanguage = "zh-cn"

enableRobotsTXT = true
summaryLength = 0

# 内容可按 2010s/2020s 等十年桶整理；对外 URL 固定为 /posts/年/slug/
[permalinks]
  [permalinks.page]
    posts = "/posts/:year/:slug/"

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[privacy]
  [privacy.vimeo]
    enableDNT = true
  [privacy.x]
    enableDNT = true
  [privacy.youTube]
    privacyEnhanced = true

[services]
  [services.x]
    disableInlineCSS = true
