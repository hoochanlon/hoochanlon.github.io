# Hugo → GitHub Pages 自动部署
# 仓库设置：Settings → Pages → Build and deployment → Source = GitHub Actions

name: Deploy Hugo site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.164.0"
      # 稳定主域名；CSS/JS 已用 RelPermalink，不绑死自定义域
      HUGO_BASEURL: "https://hoochanlon.github.io/"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 主题 congo 已 vendoring 进 themes/congo，无需 submodule
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # 提交 pnpm-lock.yaml 后可加：cache: pnpm

      # 构建前压 content/static/assets 大图（不改扩展名；只影响本次 runner 工作区）
      - name: Optimize images
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile; else pnpm install; fi
          pnpm run optimize-images

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ env.HUGO_BASEURL }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
